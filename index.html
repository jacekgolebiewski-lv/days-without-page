<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Days without Michał...</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --primary-color: #6366f1;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background: white;
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            color: #64748b;
        }

        #day-count {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            color: var(--primary-color);
            line-height: 1;
        }

        .label {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }

        #message-display {
            height: 3rem;
            margin-top: 1.5rem;
            font-style: italic;
            font-size: 1.2rem;
            color: #475569;
            font-weight: 500;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(99, 102, 241, 0.3);
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #4f46e5;
            box-shadow: 0 6px 12px rgba(99, 102, 241, 0.4);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Days without Michał</h1>
    <p id="day-count">0</p>
    <div class="label">and counting...</div>

    <button onclick="revealMessage()">Message of the Day</button>
    <div id="message-display"></div>
</div>

<script>
    // --- CONFIGURATION ---
    // Set the date when Michał was last seen (YYYY, MM-1, DD)
    // Note: Months are 0-indexed (0 = Jan, 1 = Feb, etc.)
    const LAST_SEEN_DATE = new Date(2026, 3, 15);

    const messages = [
        "Quack, quack...",
        "Be a man, don't be a part of the problem - be the whole problem",
        "Remember: your code doesn't have to work, it has to run",
        "You guys are like my family, you constantly let me down",
        "Horizontal scroll?? I don't know that one...",
    ];

    // --- LOGIC ---
    function updateCounter() {
        const now = new Date();
        const difference = now - LAST_SEEN_DATE;
        const days = Math.floor(difference / (1000 * 60 * 60 * 24));
        document.getElementById('day-count').innerText = days;
    }

    function revealMessage() {
        const now = new Date();
        const difference = now - LAST_SEEN_DATE;
        const days = Math.floor(difference / (1000 * 60 * 60 * 24));
        const display = document.getElementById('message-display');
        const randomMessage = messages[days-1%messages.length];

        display.innerText = randomMessage;

        // Confetti Blast!
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#6366f1', '#a855f7', '#ec4899']
        });
    }

    // Initialize counter
    updateCounter();
</script>
</body>
</html>
